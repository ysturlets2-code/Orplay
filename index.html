<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OrPlay Beta</title>

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #050510;
  color: white;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #050510, #1a0033);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.logo {
  font-size: 60px;
  color: #a855f7;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}

/* MAIN */
#main {
  display: none;
  padding: 20px;
  text-align: center;
}

.hero h1 {
  font-size: 35px;
  color: #a855f7;
}

/* CARDS */
.cards {
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin: 10px;
  box-shadow: 0 0 10px rgba(168,85,247,0.2);
  display: flex;
  align-items: center;
  gap: 15px;
  justify-content: center;
}

.card i {
  font-size: 22px;
  color: #c084fc;
}

/* FORM */
input {
  padding: 12px;
  width: 90%;
  border-radius: 10px;
  border: none;
  margin: 5px;
}

/* BUTTON */
button {
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #7e22ce;
  color: white;
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo"><i class="fa-solid fa-gamepad"></i></div>
  <p>Carregando...</p>
</div>

<!-- MAIN -->
<div id="main">

  <div class="hero">
    <h1><i class="fa-solid fa-rocket"></i> O futuro da interação chegou</h1>
    <p>Chat de voz, presentes, níveis e muito mais</p>
  </div>

  <div class="cards">
    <div class="card">
      <i class="fa-solid fa-microphone"></i>
      Chat de voz em tempo real
    </div>

    <div class="card">
      <i class="fa-solid fa-gift"></i>
      Sistema de presentes
    </div>

    <div class="card">
      <i class="fa-solid fa-trophy"></i>
      Ranking e fama
    </div>

    <div class="card">
      <i class="fa-solid fa-gamepad"></i>
      Jogos nas salas
    </div>
  </div>

  <h2 style="margin-top:30px;">
    <i class="fa-solid fa-flask"></i> Fase Beta
  </h2>

  <input id="name" placeholder="Seu nome">
  <input id="email" placeholder="Seu email">

  <button onclick="subscribe()">
    <i class="fa-solid fa-user-plus"></i> INSCREVER-SE
  </button>

  <p id="status"></p>

</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("UU7LqkED7r68LWH2D");
})();

// SPLASH
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("main").style.display = "block";
}, 2000);

// BLOQUEIO
let already = localStorage.getItem("orplay_user");

if (already) {
  document.getElementById("status").innerText = "Você já está na beta!";
}

// INSCRIÇÃO
function subscribe() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;

  if (already) return alert("Você já se inscreveu!");
  if (!name || !email) return alert("Preencha tudo!");

  localStorage.setItem("orplay_user", JSON.stringify({name, email}));

  emailjs.send("service_mmxztx7", "template_5kdozw9", {
    user_name: name,
    user_email: email
  })
  .then(() => {
    alert("Inscrição feita com sucesso!");
  })
  .catch(() => {
    alert("Erro ao enviar!");
  });

  document.getElementById("status").innerText = "Inscrição realizada!";
}
</script>

</body>
</html>
