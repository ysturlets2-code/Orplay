<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OrPlay Beta</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: radial-gradient(circle at top, #12002b, #050510);
  color: white;
  min-height: 100vh;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.header {
  text-align: center;
  margin-top: 40px;
}

.logo {
  font-size: 34px;
  font-weight: bold;
  color: #c084fc;
  text-shadow: 0 0 20px rgba(192,132,252,0.6);
}

.subtitle {
  opacity: 0.7;
  margin-top: 5px;
}

.card {
  margin-top: 30px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(168,85,247,0.2);
}

.input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

.input:focus {
  box-shadow: 0 0 10px #a855f7;
}

.button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #9333ea, #7e22ce);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px #a855f7;
}

#status {
  margin-top: 12px;
  text-align: center;
  font-size: 14px;
  color: #c084fc;
}
</style>

</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">ORPLAY</div>
    <div class="subtitle">Entre na fase beta antes de todo mundo</div>
  </div>

  <div class="card">
    <input id="name" class="input" placeholder="Seu nome">
    <input id="email" class="input" placeholder="Seu email">

    <button class="button" onclick="subscribe()">Entrar na Beta</button>

    <div id="status"></div>
  </div>

</div>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("UU7LqkED7r68LWH2D");
})();

function subscribe() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  if (!name || !email) {
    alert("Preencha tudo!");
    return;
  }

  emailjs.send("service_mmxztx7", "template_5kdozw9", {
    name: name,
    email: email
  })
  .then(function() {
    document.getElementById("status").innerText = "Inscricao enviada!";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
  })
  .catch(function() {
    alert("Erro ao enviar");
  });
}
</script>

</body>
</html>
